<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天气预报 - 北川博客</title>
  <meta name="description" content="磨玻璃风格的天气预报">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* 动态背景动画 */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: move 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes move {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 800px;
      width: 100%;
    }

    /* 磨玻璃卡片 */
    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      padding: 40px;
      margin-bottom: 20px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }

    /* 主天气卡片 */
    .weather-main {
      text-align: center;
      color: white;
    }

    .location {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .weather-icon {
      font-size: 5rem;
      margin: 20px 0;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    }

    .temperature {
      font-size: 4rem;
      font-weight: 700;
      text-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .condition {
      font-size: 1.4rem;
      margin-top: 10px;
      opacity: 0.95;
    }

    .feels-like {
      font-size: 1rem;
      margin-top: 8px;
      opacity: 0.8;
    }

    /* 天气详情网格 */
    .weather-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }

    .detail-item {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .detail-label {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-bottom: 8px;
    }

    .detail-value {
      font-size: 1.3rem;
      font-weight: 600;
    }

    /* 预报卡片 */
    .forecast {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
    }

    .forecast-day {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 15px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: background 0.3s ease;
    }

    .forecast-day:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .forecast-date {
      font-size: 0.9rem;
      margin-bottom: 8px;
      opacity: 0.9;
    }

    .forecast-icon {
      font-size: 2rem;
      margin: 8px 0;
    }

    .forecast-temp {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .forecast-temp .low {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-left: 5px;
    }

    /* 返回链接 */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: white;
      text-decoration: none;
      font-size: 1rem;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
      margin-top: 20px;
    }

    .back-link:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.05);
    }

    /* 加载状态 */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 响应式 */
    @media (max-width: 600px) {
      .glass-card {
        padding: 25px;
      }

      .location {
        font-size: 1.4rem;
      }

      .weather-icon {
        font-size: 3.5rem;
      }

      .temperature {
        font-size: 3rem;
      }

      .weather-details {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 主天气卡片 -->
    <div class="glass-card weather-main" id="weather-card">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>正在获取天气数据...</p>
      </div>
      
      <div id="weather-content" style="display: none;">
        <div class="location" id="location">📍 重庆</div>
        <div class="weather-icon" id="weather-icon">⛅</div>
        <div class="temperature" id="temperature">--°C</div>
        <div class="condition" id="condition">--</div>
        <div class="feels-like" id="feels-like">体感温度：--°C</div>
        
        <div class="weather-details">
          <div class="detail-item">
            <div class="detail-label">💨 风速</div>
            <div class="detail-value" id="wind">-- km/h</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">💧 湿度</div>
            <div class="detail-value" id="humidity">--%</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">🌧️ 降水</div>
            <div class="detail-value" id="precipitation">--%</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">👁️ 能见度</div>
            <div class="detail-value" id="visibility">-- km</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 天气预报卡片 -->
    <div class="glass-card" id="forecast-card" style="display: none;">
      <h2 style="color: white; margin-bottom: 20px; font-size: 1.5rem;">📅 未来预报</h2>
      <div class="forecast" id="forecast-content">
        <!-- 动态生成 -->
      </div>
    </div>

    <!-- 返回链接 -->
    <div style="text-align: center;">
      <a href="/" class="back-link">
        ← 返回博客首页
      </a>
    </div>
  </div>

  <script>
    // 天气图标映射
    const weatherIcons = {
      'sunny': '☀️',
      'clear': '☀️',
      'partly-cloudy': '⛅',
      'cloudy': '☁️',
      'overcast': '☁️',
      'rain': '🌧️',
      'light-rain': '🌦️',
      'heavy-rain': '⛈️',
      'thunderstorm': '⚡',
      'snow': '❄️',
      'light-snow': '🌨️',
      'heavy-snow': '❄️',
      'fog': '🌫️',
      'mist': '🌫️',
      'haze': '🌫️',
      'wind': '💨',
      'default': '🌤️'
    };

    // 中文天气描述映射
    const weatherConditions = {
      'sunny': '晴朗',
      'clear': '晴朗',
      'partly-cloudy': '多云',
      'cloudy': '阴天',
      'overcast': '多云',
      'rain': '下雨',
      'light-rain': '小雨',
      'heavy-rain': '大雨',
      'thunderstorm': '雷暴',
      'snow': '下雪',
      'light-snow': '小雪',
      'heavy-snow': '大雪',
      'fog': '雾',
      'mist': '薄雾',
      'haze': '雾霾',
      'wind': '大风'
    };

    // 获取天气数据
    async function fetchWeather() {
      try {
        // 使用 apis.whyta.cn 天气 API
        const city = '重庆';
        const response = await fetch(`https://tianqi.whyta.cn/?city=${encodeURIComponent(city)}&output=json`);
        
        if (!response.ok) {
          throw new Error('API 请求失败');
        }
        
        const data = await response.json();
        
        // 根据 API 返回格式解析数据（适配 apis.whyta.cn）
        const current = data.current || data.data || data;
        const location = data.location || city;
        
        // 更新主天气信息
        document.getElementById('location').textContent = `📍 ${location}`;
        document.getElementById('weather-icon').textContent = getWeatherIcon(current.weather || current.condition || '晴');
        document.getElementById('temperature').textContent = `${current.temp || current.temperature || current.tmp || '--'}°C`;
        document.getElementById('condition').textContent = current.weather || current.condition || '--';
        document.getElementById('feels-like').textContent = `体感温度：${current.feelsLike || current.feel || '--'}°C`;
        document.getElementById('wind').textContent = `${current.wind || current.windSpeed || '--'} km/h`;
        document.getElementById('humidity').textContent = `${current.humidity || current.hum || '--'}%`;
        document.getElementById('precipitation').textContent = `${current.precipitation || current.rain || '--'}%`;
        document.getElementById('visibility').textContent = `${current.visibility || current.vis || '--'} km`;
        
        // 隐藏加载，显示内容
        document.getElementById('loading').style.display = 'none';
        document.getElementById('weather-content').style.display = 'block';
        
        // 更新预报（如果有预报数据）
        if (data.forecast || data.forecasts) {
          updateForecast(data.forecast || data.forecasts);
        }
        
      } catch (error) {
        console.error('获取天气失败:', error);
        // 降级使用 wttr.in
        fetchWeatherFallback();
      }
    }

    // 降级方案：wttr.in API
    async function fetchWeatherFallback() {
      try {
        const response = await fetch('https://wttr.in/Chongqing?format=j1');
        const data = await response.json();
        
        const current = data.current_condition[0];
        const location = data.nearest_area[0];
        
        document.getElementById('location').textContent = `📍 ${location.areaName[0].value}，${location.country[0].value}`;
        document.getElementById('weather-icon').textContent = getWeatherIcon(current.weatherDesc[0].value);
        document.getElementById('temperature').textContent = `${current.temp_C}°C`;
        document.getElementById('condition').textContent = current.weatherDesc[0].value;
        document.getElementById('feels-like').textContent = `体感温度：${current.FeelLikeC}°C`;
        document.getElementById('wind').textContent = `${current.windspeedKmph} km/h`;
        document.getElementById('humidity').textContent = `${current.humidity}%`;
        document.getElementById('precipitation').textContent = `${current.chanceofrain}%`;
        document.getElementById('visibility').textContent = `${current.visibility} km`;
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('weather-content').style.display = 'block';
        
        updateForecast(data.weather);
        
      } catch (error) {
        console.error('备用 API 也失败:', error);
        document.getElementById('loading').innerHTML = '<p>获取天气数据失败，请稍后刷新</p>';
      }
    }

    // 获取天气图标
    function getWeatherIcon(desc) {
      const lower = desc.toLowerCase();
      for (const [key, icon] of Object.entries(weatherIcons)) {
        if (lower.includes(key)) return icon;
      }
      return weatherIcons.default;
    }

    // 更新天气预报
    function updateForecast(weatherData) {
      const forecastContent = document.getElementById('forecast-content');
      forecastContent.innerHTML = '';
      
      // 显示未来 3 天预报
      weatherData.slice(0, 3).forEach(day => {
        const date = new Date(day.date);
        const dayName = date.toLocaleDateString('zh-CN', { weekday: 'short' });
        const maxTemp = day.maxtempC;
        const minTemp = day.mintempC;
        const icon = getWeatherIcon(day.avgWeatherDesc[0].value);
        
        const dayCard = document.createElement('div');
        dayCard.className = 'forecast-day';
        dayCard.innerHTML = `
          <div class="forecast-date">${dayName}</div>
          <div class="forecast-icon">${icon}</div>
          <div class="forecast-temp">${maxTemp}°C<span class="low">${minTemp}°C</span></div>
        `;
        forecastContent.appendChild(dayCard);
      });
      
      document.getElementById('forecast-card').style.display = 'block';
    }

    // 页面加载时获取天气
    fetchWeather();
    
    // 每 30 分钟刷新一次
    setInterval(fetchWeather, 30 * 60 * 1000);
  </script>
</body>
</html>
