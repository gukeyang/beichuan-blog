<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变：深空灰蓝，营造沉稳科技感 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/> <!-- Slate 800 -->
      <stop offset="100%" stop-color="#0f172a"/> <!-- Slate 900 -->
    </linearGradient>
    
    <!-- 全息光感滤镜 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 1. 容器：圆角矩形，深色背景突出内容 -->
  <rect x="20" y="20" width="160" height="160" rx="36" fill="url(#bgGrad)"/>

  <!-- 2. 知识基石（书本）：使用线框风格，代表基础知识 -->
  <!-- 左页 -->
  <path d="M50 135 Q 50 155, 70 155 H 100 V 115 H 70 Q 50 115, 50 135 Z" fill="none" stroke="#64748b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 右页 -->
  <path d="M150 135 Q 150 155, 130 155 H 100 V 115 H 130 Q 150 115, 150 135 Z" fill="none" stroke="#64748b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 3. 科技结晶（悬浮立方）：代表核心技术/算法/Coding -->
  <!-- 使用 JavaGuide 绿色，增加呼吸动画 -->
  <g transform="translate(100, 75)" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="100 75; 100 70; 100 75" dur="3s" repeatCount="indefinite" additive="replace"/>
    
    <!-- 立方体顶面 -->
    <path d="M0 -25 L 22 -12 L 0 1 L -22 -12 Z" fill="#42d392"/>
    <!-- 立方体左面 -->
    <path d="M-22 -12 L 0 1 V 26 L -22 13 Z" fill="#33a06f"/>
    <!-- 立方体右面 -->
    <path d="M22 -12 L 0 1 V 26 L 22 13 Z" fill="#289161"/>
  </g>

  <!-- 4. 数据传输流：连接书本与立方体，象征知识转化为技术 -->
  <path d="M100 115 V 101" stroke="#3eaf7c" stroke-width="3" stroke-dasharray="4 4" stroke-linecap="round"/>
  
  <!-- 左右两侧的环绕粒子 -->
  <circle cx="65" cy="90" r="3" fill="#3eaf7c" opacity="0.6">
     <animate attributeName="cy" values="115;80" dur="2s" repeatCount="indefinite"/>
     <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="135" cy="100" r="3" fill="#3eaf7c" opacity="0.6">
     <animate attributeName="cy" values="115;80" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
     <animate attributeName="opacity" values="0.8;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

</svg>
