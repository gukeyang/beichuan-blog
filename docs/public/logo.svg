<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)" filter="url(#shadow)"/>
  
  <!-- 山峰图案 (代表"川") -->
  <path d="M 20 65 L 35 45 L 45 55 L 55 35 L 70 55 L 80 45 L 80 70 L 20 70 Z" 
        fill="white" opacity="0.95"/>
  
  <!-- 书本图案 (代表知识库) -->
  <rect x="30" y="58" width="40" height="12" rx="2" fill="white" opacity="0.3"/>
  <line x1="50" y1="58" x2="50" y2="70" stroke="white" stroke-width="1.5" opacity="0.5"/>
  
  <!-- 北字简化版 (顶部装饰) -->
  <path d="M 35 38 L 45 38 L 45 42 L 55 42 L 55 38 L 65 38 L 65 48 L 55 48 L 55 44 L 45 44 L 45 48 L 35 48 Z" 
        fill="white" opacity="0.4"/>
</svg>
